services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: message-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/message-api
    volumes:
      - sessions_data:/app/.sessions
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: message-api-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  sessions_data:
