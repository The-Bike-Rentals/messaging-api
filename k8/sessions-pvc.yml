apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: azure-blob-whatsapp-logs   # must match deployment volumeMounts PVC claimName
  namespace: whatsapp
spec:
  accessModes:
    - ReadWriteMany                 # Azure Files (SMB) supports RWX; required for reliable file I/O
  resources:
    requests:
      storage: 1Gi
  storageClassName: azurefile      # Azure Files (SMB) — proper filesystem semantics needed by Baileys
                                   # azureblob-fuse-premium / blob-nfs are object storage and
                                   # do NOT guarantee fsync, which breaks useMultiFileAuthState
