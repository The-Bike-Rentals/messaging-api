<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password – Message API Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">M</div>
      <div><div class="brand-name">Message API</div><div class="brand-sub">Admin Portal</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">WhatsApp</div>
      <a href="/admin/sessions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Sessions
      </a>
      <div class="nav-section-title">Settings</div>
      <a href="/admin/config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Email &amp; SMS Config
      </a>
      <a href="/admin/change-password" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Change Password
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
      </a>
    </div>
  </aside>

  <div class="main-wrap">
    <div class="topbar"><h1>Change Password</h1></div>
    <div class="content">
      <div class="card" style="max-width:440px;">
        <div id="msg-box"></div>
        <form id="cpw-form">
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" id="cur-pass" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="new-pass" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" id="conf-pass" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-primary" id="save-btn">Save Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
  document.getElementById('cpw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const cur = document.getElementById('cur-pass').value;
    const nw = document.getElementById('new-pass').value;
    const conf = document.getElementById('conf-pass').value;
    const msgBox = document.getElementById('msg-box');
    msgBox.innerHTML = '';

    if (nw !== conf) {
      msgBox.innerHTML = '<div class="alert alert-danger">New passwords do not match.</div>';
      return;
    }
    if (nw.length < 8) {
      msgBox.innerHTML = '<div class="alert alert-danger">Password must be at least 8 characters.</div>';
      return;
    }
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const resp = await fetch('/api/admin/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: cur, newPassword: nw }),
      });
      const data = await resp.json();
      if (data.success) {
        msgBox.innerHTML = '<div class="alert alert-success">Password updated successfully.</div>';
        document.getElementById('cpw-form').reset();
      } else {
        msgBox.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
      }
    } catch { msgBox.innerHTML = '<div class="alert alert-danger">Request failed.</div>'; }
    finally { btn.disabled = false; btn.textContent = 'Save Password'; }
  });
  document.getElementById('logout-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    await fetch('/api/admin/logout', { method: 'POST' });
    window.location.href = '/admin/login';
  });

  // ── Auth guard (handles expired/missing session) ────────
  (async () => {
    const resp = await fetch('/api/admin/me');
    if (resp.status === 401 || resp.status === 403) {
      window.location.href = '/admin/login';
    }
  })();
</script>
</body>
</html>
